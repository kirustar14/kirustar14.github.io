<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>BLEprint — Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
</head>
<body class="blueprint-bg">

<!-- ── Toast ───────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Loading ─────────────────────────────────────── -->
<div id="loading" class="loading-overlay">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="spinner" style="color:var(--blue);width:28px;height:28px;border-width:3px;"></div>
    <span style="font-family:var(--font-mono);color:var(--text-secondary);font-size:0.85rem;letter-spacing:0.06em;text-transform:uppercase;">Loading…</span>
  </div>
</div>

<!-- ── Auth Page ────────────────────────────────────── -->
<div id="auth-page" class="auth-page hidden">

  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="auth-logo-name">BLEprint</div>
    <div class="auth-logo-tag">Construction AR Documentation</div>
  </div>

  <!-- Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="worker@site.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span>Login</span>
      </button>

      <div class="divider">or</div>

      <button type="button" class="btn btn-google btn-full" id="google-login-btn" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="signup-name" placeholder="Alex Rivera" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="worker@site.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" id="signup-confirm" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
        <span>Create Account</span>
      </button>

      <div class="divider">or</div>

      <button type="button" class="btn btn-google btn-full" id="google-signup-btn" onclick="handleGoogleLogin()">
        <svg viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Sign up with Google
      </button>
    </form>

    <div class="auth-footer">
      By continuing you agree to our <span style="color:var(--blue)">Terms of Service</span>
    </div>
  </div>

  <!-- Version -->
  <div style="margin-top:24px;font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;">
    v1.0.0 MVP &nbsp;·&nbsp; Feb 2026
  </div>
</div>

<!-- ── Firebase & Auth JS ────────────────────────────────────── -->

<script type="module">
import { initializeApp }              from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         updateProfile, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { FIREBASE_CONFIG, GOOGLE_CLIENT_ID } from './firebase-config.js';

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);

// ── Toast utility ────────────────────────────────────────────
function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('fadeout'); setTimeout(() => t.remove(), 300); }, 3500);
}
window.toast = toast;

// ── Tab switching ─────────────────────────────────────────────
window.switchTab = (tab) => {
  const isLogin = tab === 'login';
  document.getElementById('login-form').classList.toggle('hidden', !isLogin);
  document.getElementById('signup-form').classList.toggle('hidden', isLogin);
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-signup').classList.toggle('active', !isLogin);
};

// ── Auth state ────────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  document.getElementById('loading').classList.add('hidden');
  if (user) {
    window.location.href = 'app.html';
  } else {
    document.getElementById('auth-page').classList.remove('hidden');
  }
});

// ── Login ─────────────────────────────────────────────────────
window.handleLogin = async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  btn.innerHTML = '<div class="spinner"></div> Logging in…';
  btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged will redirect
  } catch (err) {
    toast(friendlyError(err.code), 'error');
    btn.innerHTML = '<span>Login</span>';
    btn.disabled = false;
  }
};

// ── Sign Up ───────────────────────────────────────────────────
window.handleSignup = async (e) => {
  e.preventDefault();
  const name    = document.getElementById('signup-name').value.trim();
  const email   = document.getElementById('signup-email').value.trim();
  const pass    = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (pass !== confirm) { toast('Passwords do not match', 'error'); return; }
  const btn = document.getElementById('signup-btn');
  btn.innerHTML = '<div class="spinner"></div> Creating account…';
  btn.disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    // onAuthStateChanged will redirect
  } catch (err) {
    toast(friendlyError(err.code), 'error');
    btn.innerHTML = '<span>Create Account</span>';
    btn.disabled = false;
  }
};

// ── Google Login ──────────────────────────────────────────────
window.handleGoogleLogin = async () => {
  const provider = new GoogleAuthProvider();
  try {
    await signInWithPopup(auth, provider);
    // onAuthStateChanged will redirect
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') {
      toast(friendlyError(err.code), 'error');
    }
  }
};

// ── Friendly errors ───────────────────────────────────────────
function friendlyError(code) {
  const map = {
    'auth/user-not-found':      'No account found with that email.',
    'auth/wrong-password':      'Incorrect password.',
    'auth/email-already-in-use':'An account with that email already exists.',
    'auth/invalid-email':       'Invalid email address.',
    'auth/weak-password':       'Password must be at least 6 characters.',
    'auth/too-many-requests':   'Too many attempts. Please try again later.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
